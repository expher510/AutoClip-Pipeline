<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8" />
  <title>YouTube Sender</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --red      : #ff2c2c;
      --red-dark : #cc0000;
      --bg       : #0f0f0f;
      --surface  : #1a1a1a;
      --border   : #2e2e2e;
      --text     : #f1f1f1;
      --muted    : #aaaaaa;
      --green    : #2eca7f;
      --orange   : #ff8c00;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family : 'Cairo', sans-serif;
      background  : var(--bg);
      color       : var(--text);
      width       : 360px;
      direction   : rtl;
    }

    .header {
      background : linear-gradient(135deg, #ff0000, #cc0000);
      padding    : 14px 18px;
      display    : flex;
      align-items: center;
      gap        : 10px;
    }
    .header-icon  { font-size: 22px; }
    .header-title { font-size: 15px; font-weight: 900; color: #fff; }
    .header-sub   { font-size: 11px; color: rgba(255,255,255,.75); }

    .body { padding: 14px; display: flex; flex-direction: column; gap: 12px; }

    .webhook-section {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .input-label {
      font-size   : 11px;
      font-weight : 700;
      color       : var(--muted);
      letter-spacing: .5px;
    }
    .webhook-input {
      width        : 100%;
      background   : var(--surface);
      border       : 1px solid var(--border);
      border-radius: 10px;
      color        : var(--text);
      font-family  : 'Cairo', sans-serif;
      font-size    : 12px;
      padding      : 10px 12px;
      direction    : ltr;
      outline      : none;
      transition   : border-color .2s;
    }
    .webhook-input:focus        { border-color: var(--red); }
    .webhook-input::placeholder { color: #555; }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
    }

    .warning {
      background  : #1e1400;
      border      : 1px solid #ffd60a;
      border-radius: 10px;
      padding     : 14px;
      text-align  : center;
      color       : #ffd60a;
      font-size   : 13px;
      font-weight : 600;
      display     : none;
    }
    .warning span { font-size: 20px; display: block; margin-bottom: 6px; }

    .video-card {
      background   : var(--surface);
      border       : 1px solid var(--border);
      border-radius: 12px;
      padding      : 12px;
      display      : none;
    }
    .video-label   { font-size: 10px; font-weight: 700; color: var(--red); letter-spacing: .8px; margin-bottom: 6px; }
    .video-title   { font-size: 13px; font-weight: 700; line-height: 1.5; margin-bottom: 4px; }
    .video-channel { font-size: 12px; color: var(--muted); font-weight: 600; }
    .video-url     { font-size: 10px; color: var(--muted); margin-top: 4px; word-break: break-all; direction: ltr; text-align: left; }

    .actions-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .cookies-btn {
      width        : 100%;
      background   : var(--orange);
      color        : #fff;
      border       : none;
      border-radius: 10px;
      padding      : 11px 16px;
      font-family  : 'Cairo', sans-serif;
      font-size    : 13px;
      font-weight  : 700;
      cursor       : pointer;
      transition   : opacity .2s;
      display      : flex;
      align-items  : center;
      justify-content: center;
      gap          : 8px;
    }
    .cookies-btn:hover    { opacity: .85; }
    .cookies-btn:disabled { background: #555; cursor: not-allowed; opacity: 1; }

    .klabng-btn {
      width        : 100%;
      background   : var(--red);
      color        : #fff;
      border       : none;
      border-radius: 10px;
      padding      : 12px 16px;
      font-family  : 'Cairo', sans-serif;
      font-size    : 15px;
      font-weight  : 900;
      cursor       : pointer;
      transition   : opacity .2s, background .2s;
      display      : flex;
      align-items  : center;
      justify-content: center;
      gap          : 8px;
      letter-spacing: .5px;
    }
    .klabng-btn:hover    { opacity: .85; }
    .klabng-btn:disabled { background: #555; cursor: not-allowed; opacity: 1; }

    .action-status {
      font-size   : 12px;
      text-align  : center;
      color       : var(--muted);
      min-height  : 18px;
    }
    .action-status.success { color: var(--green); }
    .action-status.error   { color: var(--red); }

    .hint {
      background   : #0d1f2d;
      border       : 1px solid #1a4a6e;
      border-radius: 10px;
      padding      : 12px;
      font-size    : 12px;
      color        : #7ec8e3;
      line-height  : 1.7;
      display      : none;
    }
    .hint strong { color: #fff; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-icon">▶️</div>
  <div>
    <div class="header-title">YouTube Video Sender</div>
    <div class="header-sub">ابعت بيانات الفيديو أو الكوكيز للـ Webhook</div>
  </div>
</div>

<div class="body">

  <!-- Webhook field — always visible -->
  <div class="webhook-section">
    <div class="input-label">🔗 WEBHOOK URL</div>
    <input
      class="webhook-input"
      type="url"
      id="webhookUrl"
      placeholder="https://your-webhook.com/endpoint"
    />
  </div>

  <hr class="divider" />

  <div class="warning" id="warning">
    <span>⚠️</span>
    مش على صفحة فيديو يوتيوب!<br/>
    <small style="font-weight:400;color:#aaa;font-size:11px;">روح على youtube.com/watch?v=...</small>
  </div>

  <div class="video-card" id="videoCard">
    <div class="video-label">الفيديو الحالي</div>
    <div class="video-title"   id="videoTitle">جاري التحميل...</div>
    <div class="video-channel" id="videoChannel"></div>
    <div class="video-url"     id="videoUrl"></div>
  </div>

  <!-- Buttons always visible -->
  <div class="actions-section">

    <button class="cookies-btn" id="cookiesBtn">
      🍪 إرسال الكوكيز
    </button>

    <button class="klabng-btn" id="klabngBtn">
      🎬 كلبنج
    </button>

    <div class="action-status" id="actionStatus"></div>
  </div>

  <div class="hint" id="hint">
    ✅ كل حاجة جاهزة!<br/>
    دوس <strong>🎬 كلبنج</strong> لإرسال بيانات الفيديو، أو <strong>🍪 إرسال الكوكيز</strong> لإرسال الكوكيز بس.
  </div>

</div>

<script src="popup.js"></script>
</body>
</html>
